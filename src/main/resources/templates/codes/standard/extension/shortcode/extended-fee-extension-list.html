<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{codes_layout :: page_head}">
  <title th:text="#{extendedFeeExtension}">Application Fee Extended List</title>

  <div th:replace="styles :: data-tables-styles"></div>
  <div th:replace="styles :: common-css"></div>
  <div th:replace="styles :: commonfieldset-with-legend-border"></div>
</head>

<body>
<nav th:replace="~{codes_layout :: page_navbar}"></nav>

<div class="container-fluid"
     th:classappend="${#locale.language == 'ps' or #locale.language == 'prs'} ? 'label-rtl' : 'label-ltr'">

  <fieldset>
    <legend th:text="#{shortCodeExtendedRecords}"></legend>

    <div class="table-container">
      <table class="slip table table-bordered table-striped"
             id="profileTable"
             style="width:100%">

        <thead>
        <tr class="bg-primary text-white">
          <th>#</th>
          <th>Code Detail ID</th>
          <th th:text="#{shortCode}"></th>
          <th th:text="#{codesStatus}"></th>
          <th th:text="#{sourceUsed}"></th>
          <th th:text="#{codeLocation}"></th>
          <th th:text="#{selectCategoryType}"></th>
          <th th:text="#{selectCategory}"></th>
          <th th:text="#{codeChannel}"></th>
          <th th:text="#{codeEmail}"></th>
          <th th:text="#{extend}"></th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="row, iStat : ${extensions}">

          <td th:text="${iStat.count}">1</td>
          <td th:text="${row[0]}">ID</td>
          <td th:text="${row[1]}">Short Code</td>
          <td th:text="${row[2]}">Status</td>
          <td th:text="${row[3]}">Source</td>
          <td th:text="${row[4]}">Location</td>
          <td th:text="${row[5]}">Category Type</td>
          <td th:text="${row[6]}">Category</td>
          <td th:text="${row[7]}">Channel</td>
          <td th:text="${row[8]}">Email</td>

          <!-- Action -->
          <td class="text-center">
            <a th:href="@{/codes/extended/code-extension/extension-fee/create/{id}(id=${row[0]})}">
              <img th:src="@{/images/codesExtension.png}" alt="extension" />
            </a>
          </td>

        </tr>
        </tbody>

      </table>
    </div>
  </fieldset>

  <a th:href="@{/codes/finance/extension/home}"
     class="btn btn-primary mt-3">
    ← <span th:text="#{codesBack}"></span>
  </a>

</div>

<!-- Scripts -->
<div th:replace="scripts :: common-scripts"></div>
<div th:replace="scripts :: data-tables-scripts"></div>
<div th:replace="scripts :: common-datatable"></div>

<div style="height:10vh;"></div>
<footer th:replace="~{codes_layout :: page_footer}"></footer>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>

</body>
</html>
