<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:lang="#{lang}"
      th:dir="${#locale.language == 'ps' or #locale.language == 'prs' ? 'rtl' : 'ltr'}">

<head th:replace="~{codes_layout :: page_head}"></head>

<body>

<!-- Navbar -->
<div th:replace="~{codes_layout :: page_navbar}"></div>

<div class="container-fluid mt-4">

    <fieldset class="commonfieldset-with-legend-border">
        <legend>Short Code Application Fee Extensions</legend>

        <table id="profileTable" class="table table-bordered table-striped table-hover">

            <thead class="bg-primary text-white">
            <tr>
                <th>Short Code</th>
                <th>Status</th>
                <th>Location</th>
                <th>Category Type</th>
                <th>Category</th>
                <th>Channel</th>
                <th>Email</th>
                <th>Extension Date (Jalali)</th>
                <th>Expiration Date (Jalali)</th>
                <th>Entry Voucher Date (Jalali)</th>
                <th>Bank Voucher Submission Date (Jalali)</th>
                <th>Extended Fee</th>
                <th>Voucher No</th>
                <th>Payment Status</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="ext : ${extensions}">
                <td th:text="${ext.shortCodeName}"></td>
                <td th:text="${ext.codeStatus}"></td>
                <td th:text="${ext.location}"></td>
                <td th:text="${ext.categoryType}"></td>
                <td th:text="${ext.category}"></td>
                <td th:text="${ext.chanel}"></td>
                <td th:text="${ext.emailOfResponsiblePerson}"></td>

                <td th:text="${ext.applicationFeeExtensionDateJalali}"></td>
                <td th:text="${ext.applicationFeeExtensionExpirationDateJalali}"></td>
                <td th:text="${ext.applicationFeeExtensionEntryVoucherDateJalali}"></td>
                <td th:text="${ext.applicationFeeExtensionBankVoucherSubmissionDateJalali}"></td>

                <td th:text="${ext.applicationFeeExtendedFees}"></td>
                <td th:text="${ext.applicationFeeExtensionBankVoucherNo}"></td>
                <td th:text="${ext.applicationFeeExtensionPaymentStatus}"></td>
            </tr>
            </tbody>

        </table>

    </fieldset>

</div>

<!-- Footer -->
<div th:replace="~{codes_layout :: page_footer}"></div>


<!-- DataTables Initialization -->
<script>
    $(document).ready(function () {
        $('#profileTable').DataTable({
            "paging": true,
            "searching": true,
            "ordering": true,
            "info": true,
            "autoWidth": false,
            "language": {
                "url": /* Optional: path to your DataTables language file for RTL if needed */
            }
        });
    });
</script>

</body>
</html>
