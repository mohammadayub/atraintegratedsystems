<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:lang="#{lang}">

<head th:replace="~{codes_layout :: page_head}">
    <title>Short Code Extension Paid List</title>

    <div th:replace="styles :: data-tables-styles"></div>
    <div th:replace="styles :: common-css"></div>
    <div th:replace="styles :: commonfieldset-with-legend-border"></div>
</head>

<body>

<nav th:replace="~{codes_layout :: page_navbar}"></nav>

<div class="container-fluid"
     th:classappend="${#locale.language == 'ps' or #locale.language == 'prs'} ? 'label-rtl' : 'label-ltr'">

    <fieldset class="commonfieldset-with-legend-border">
        <legend>Short Code Extension Paid List</legend>

        <div class="table-container">

            <table class="slip table table-bordered table-striped table-hover"
                   id="profileTable"
                   style="width:100%">

                <!-- ================= HEADER ================= -->
                <thead>
                <tr class="bg-primary text-white">
                    <th>#</th>
                    <th>ID</th>
                    <th>Short Code</th>
                    <th>Serial</th>
                    <th>Status</th>
                    <th>Company</th>
                    <th>Location</th>
                    <th>Category</th>
                    <th>Channel</th>
                    <th>Responsible</th>
                    <th>Mobile</th>
                    <th>Assign Date</th>
                    <th>Expire Date</th>
                    <th>Ext Date</th>
                    <th>Ext Expire</th>
                    <th>Fee</th>
                    <th>Voucher No</th>
                    <th>Payment</th>
                    <th>Action</th>
                </tr>
                </thead>

                <!-- ================= BODY ================= -->
                <tbody>

                <tr th:each="ext, iStat : ${extensions}">

                    <td th:text="${iStat.count}">1</td>

                    <td th:text="${ext.codeDetailId} ?: '-'"></td>

                    <td th:text="${ext.shortCodeName} ?: '-'"></td>

                    <td th:text="${ext.serialNumber} ?: '-'"></td>

                    <td th:text="${ext.codeStatus} ?: '-'"></td>

                    <td th:text="${ext.sourceUsed} ?: '-'"></td>

                    <td th:text="${ext.location} ?: '-'"></td>

                    <td th:text="${ext.category} ?: '-'"></td>

                    <td th:text="${ext.chanel} ?: '-'"></td>

                    <td th:text="${ext.nameOfResponsiblePerson} ?: '-'"></td>

                    <td th:text="${ext.mobileNumberOfResponsiblePerson} ?: '-'"></td>

                    <td th:text="${ext.assigningDateJalali} ?: '-'"></td>

                    <td th:text="${ext.expirationDateJalali} ?: '-'"></td>

                    <td th:text="${ext.extendedFeeExtensionDateJalali} ?: '-'"></td>

                    <td th:text="${ext.extendedFeeExtensionExpirationDateJalali} ?: '-'"></td>

                    <td th:text="${ext.extendedFees} ?: '0'"></td>

                    <td th:text="${ext.extendedFeeExtensionBankVoucherNo} ?: '-'"></td>

                    <td>
                        <span class="badge bg-success"
                              th:if="${ext.extendedFeeExtensionPaymentStatus == 'PAID'}">
                            PAID
                        </span>

                        <span class="badge bg-warning"
                              th:if="${ext.extendedFeeExtensionPaymentStatus != 'PAID'}">
                            PENDING
                        </span>
                    </td>

                    <!-- ACTION -->
                    <td>
                        <a class="btn btn-success btn-sm"
                           th:href="@{/codes/extended/extensions/print/{id}(id=${ext.codeDetailId})}"
                           target="_blank">
                            🖨 Print
                        </a>
                    </td>

                </tr>

                </tbody>

            </table>

        </div>
    </fieldset>

    <!-- BACK BUTTON -->
    <a th:href="@{/codes}" class="btn btn-primary mt-3">
        ← Back to Page
    </a>

</div>

<!-- ================= SCRIPTS ================= -->
<div th:replace="scripts :: common-scripts"></div>
<div th:replace="scripts :: data-tables-scripts"></div>
<div th:replace="scripts :: common-datatable"></div>

<footer th:replace="~{codes_layout :: page_footer}"></footer>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>

</body>
</html>
