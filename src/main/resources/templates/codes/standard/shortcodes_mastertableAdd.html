<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{codes_layout :: page_head}">
    <title>Add Short Code</title>
    <div th:replace="styles :: select2-styles"></div>
    <div th:replace="styles :: common-css"></div>

    <style>
        body{
            background:#f8f9fa;
            font-family:'EB Garamond',serif;
            font-weight:bold;
        }

        .container{
            margin-top:70px;
        }

        .card{
            border-radius:15px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }
        /* ✅ FIX RTL/LTR FOR LEGEND */
        .label-rtl legend {
            direction: rtl;
            text-align: right;
        }

        .label-ltr legend {
            direction: ltr;
            text-align: left;
        }
    </style>

</head>

<body>

<nav th:replace="~{codes_layout :: page_navbar}"></nav>

<div class="container d-flex justify-content-center">

    <div class="col-md-5">

        <div class="card p-4">

            <h3 th:text="#{addShortCode}" class="text-center text-primary mb-4">
                Add Short Code
            </h3>

            <form th:action="@{/codes/standard/shortcodes/add}"
                  th:object="${codeDTO}"
                  method="post">

                <div class="mb-3">

                    <label th:text="#{shortCode}" class="form-label">
                        Short Code
                    </label>

                    <input type="number"
                           th:field="*{shortCodeName}"
                           class="form-control"
                           placeholder="Enter Short Code"
                           required>

                </div>

                <button type="submit" th:text="#{codesSave}"
                        class="btn btn-primary w-100">

                    Save
                </button>

                <div th:if="${errorMessage}"
                     class="alert alert-danger mt-3">

                    <span th:text="${errorMessage}"></span>

                </div>

            </form>

            <div class="text-center mt-3">

                <a th:href="@{/codes/standard/shortcodes/home}" th:text="#{codesBack}"
                   class="btn btn-secondary">

                    Back

                </a>

            </div>

        </div>

    </div>

</div>
<div th:replace="scripts :: common-scripts"></div>
<footer th:replace="~{codes_layout :: page_footer}"></footer>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
