<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity3">

<head th:replace="~{codes_layout :: page_head}">
    <div th:replace="styles :: persian-datepicker-styles"></div>
    <div th:replace="styles :: select2-styles"></div>
    <div th:replace="styles :: common-css"></div>
    <title>Telecom Short Codes Management System</title>
</head>

<body>

<nav th:replace="~{codes_layout :: page_navbar}"></nav>

<div class="container-fluid mt-4"
     th:classappend="${#locale.language == 'ps' or #locale.language == 'prs'} ? 'label-rtl' : 'label-ltr'">

    <form th:action="@{/codes/standard/shortcodes_detailsAdd/add}"
          th:object="${codeDetailDTO}"
          method="post"
          enctype="multipart/form-data">

        <fieldset style="border:2px solid #DCAF45;padding:15px;border-radius:8px;margin-bottom:20px;">
            <legend style="width:auto;font-size:1.2rem;color:#14438B;padding:0 10px;font-weight:bold;">
                <span th:text="#{telecomShortCodeDetails}">Telecom ShortCode Details</span>
            </legend>

            <div class="row g-3">

                <input type="hidden" th:field="*{id}"/>

                <!-- ROW 1 -->
                <div class="col-md-3 form-group">
                    <label th:text="#{shortCode}">Short Code</label>
                    <select class="form-control search-select" th:field="*{shortCodeId}">
                        <option value="">-- Select Short Code --</option>
                        <option th:each="sc : ${codes}"
                                th:value="${sc.id}"
                                th:text="${sc.shortCodeName}">
                        </option>
                    </select>
                </div>

                <div class="col-md-3 form-group">
                    <label th:text="#{codeLicenseApplicant}">License Applicant</label>
                    <select class="form-control select2" th:field="*{licenseApplicantId}">
                        <option value="">None</option>
                        <option th:each="la : ${licenseApplicants}"
                                th:value="${la.id}"
                                th:text="${la.companyLicenseName + ' — ' +
                                #temporals.format(la.reqDate,'yyyy-MM-dd') +
                                ' — Validity: ' + la.validity +
                                ' — Admin Fee: ' + la.administrationFeePaymentStatus}">
                        </option>
                    </select>
                </div>

                <!-- ROW 2 -->
                <div class="col-md-3 form-group">
                    <label th:text="#{sourceUsed}">Source Used</label>
                    <input type="text" class="form-control" th:field="*{sourceUsed}">
                </div>

                <div class="col-md-3 form-group">
                    <label th:text="#{sourceUsedInDari}">Source Used in Dari</label>
                    <input type="text" class="form-control" th:field="*{sourceUsedInDari}">
                </div>

                <div class="col-md-3 form-group">
                    <label th:text="#{codeLocation}">Location</label>
                    <input type="text" class="form-control" th:field="*{location}">
                </div>

                <div class="col-md-3 form-group">
                    <label th:text="#{codeAddress}">Address</label>
                    <input type="text" class="form-control" th:field="*{address}">
                </div>

                <div class="col-md-3 form-group">
                    <label th:text="#{codeChannel}">Channel</label>
                    <select class="form-control" th:field="*{chanel}">
                        <option value="IVR">IVR</option>
                        <option value="SMS">SMS</option>
                        <option value="USSD">USSD</option>
                        <option value="Simple Call Center">Simple Call Center</option>
                    </select>
                </div>

                <div class="col-md-3 form-group">
                    <label th:text="#{service}">Services</label>
                    <textarea class="form-control" th:field="*{services}"></textarea>
                </div>

                <!-- ROW 3 -->
                <div class="col-md-3 form-group">
                    <label th:text="#{selectCategoryType}">Select Category Type</label>
                    <select class="form-control"
                            th:field="*{categoryType}"
                            id="categoryType"
                            onchange="updateCategoryValues()">

                        <option th:value="Technical01">Technical01</option>
                        <option th:value="Business01">Business01</option>
                        <option th:value="Technical02">Technical02</option>
                        <option th:value="Business02">Business02</option>
                        <option th:value="SubShortCodes">SubShortCodes</option>

                    </select>
                </div>

                <div class="col-md-3 form-group">
                    <label th:text="#{selectCategory}">Select Category</label>
                    <select class="form-control"
                            th:field="*{category}"
                            id="category"
                            onchange="calculateTotalFees()">

                        <option th:value="Golden">Golden</option>
                        <option th:value="Silver">Silver</option>
                        <option th:value="Normal">Normal</option>
                        <option th:value="SubShortCodes">SubShortCodes</option>

                    </select>
                </div>

                <div class="col-md-3 form-group">
                    <label th:text="#{backLongNumber}">Back Long Number</label>
                    <input type="text" class="form-control" th:field="*{backLongNumber}">
                </div>

                <div class="col-md-3 form-group">
                    <label th:text="#{fullName}">Full Name</label>
                    <input type="text" class="form-control" th:field="*{nameOfResponsiblePerson}">
                </div>

                <div class="col-md-3 form-group">
                    <label th:text="#{job}">Job</label>
                    <input type="text" class="form-control" th:field="*{job}">
                </div>

                <!-- ROW 4 -->
                <div class="col-md-3 form-group">
                    <label th:text="#{tazkira}">ID Card Number</label>
                    <input type="text" class="form-control"
                           th:field="*{idCardNumberOfResponsiblePerson}">
                </div>

                <div class="col-md-3 form-group">
                    <label th:text="#{mobileNumber}">Mobile Number</label>
                    <input type="text" class="form-control"
                           th:field="*{mobileNumberOfResponsiblePerson}">
                </div>

                <div class="col-md-3 form-group">
                    <label th:text="#{codeEmail}">Email Address</label>
                    <input type="text" class="form-control"
                           th:field="*{emailOfResponsiblePerson}">
                </div>

                <div class="col-md-3 form-group">
                    <label th:text="#{assingingDate}">Assigning Date</label>
                    <input type="text" class="form-control hijrishamsi"
                           th:field="*{assigningDateJalali}">
                </div>

                <!-- ROW 5 -->
                <div class="col-md-3 form-group">
                    <label th:text="#{expiryDate}">Expiry Date</label>
                    <input type="text" class="form-control hijrishamsi"
                           th:field="*{expirationDateJalali}">
                </div>

                <div class="col-md-3 form-group">
                    <label th:text="#{applicationFee}">Application Fees</label>
                    <input type="number" class="form-control"
                           th:field="*{applicationFees}" readonly>
                </div>

                <div class="col-md-3 form-group">
                    <label th:text="#{royaltyFee}">Royalty Fees</label>
                    <input type="number" class="form-control"
                           th:field="*{royaltyFees}" readonly>
                </div>

                <div class="col-md-3 form-group">
                    <label th:text="#{remark}">Remarks</label>
                    <textarea class="form-control"
                              th:field="*{remarks}"></textarea>
                </div>

                <input type="hidden" id="totalFees">

            </div>

            <!-- BUTTONS -->
            <div class="row mt-4">
                <div class="col-md-4 mx-auto d-flex justify-content-center gap-2">

                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-check"></i>
                        <span th:text="#{addRecord}">Add Record</span>
                    </button>
                    &nbsp;&nbsp;&nbsp;&nbsp;

                    <button type="reset" class="btn btn-info">
                        <i class="fas fa-redo"></i>
                        <span th:text="#{resetRecord}">Reset</span>
                    </button>

                </div>
            </div>

        </fieldset>
    </form>
</div>

<!-- SCRIPTS -->
<div th:replace="scripts :: common-scripts"></div>
<div th:replace="scripts :: persian-datepicker-scripts"></div>
<div th:replace="scripts :: select2-scripts"></div>
<div th:replace="scripts :: common-hijrishamsi-date"></div>

<!-- YOUR JS (UNCHANGED) -->
<script>
    function updateCategoryValues() {
        var categoryType = document.getElementById('categoryType').value;
        var categorySelect = document.getElementById('category');
        var selectedValue = categorySelect.value;

        categorySelect.innerHTML = '';

        var categories = [];
        if (categoryType === 'SubShortCodes') {
            categories = ['SubShortCodes'];
        } else {
            categories = ['Golden', 'Silver', 'Normal'];
        }

        categories.forEach(function (c) {
            var opt = document.createElement('option');
            opt.value = c;
            opt.text = c;
            if (c === selectedValue) opt.selected = true;
            categorySelect.appendChild(opt);
        });

        calculateTotalFees();
    }

    function calculateTotalFees() {
        var categoryType = document.getElementById('categoryType').value;
        var category = document.getElementById('category').value;

        var applicationFees = 0;
        var royaltyFees = 0;

        if (categoryType === 'Technical01') {
            applicationFees = 5000;
            royaltyFees = category === 'Golden' ? 50000 :
                          category === 'Silver' ? 40000 : 30000;
        }

        if (categoryType === 'Business01') {
            applicationFees = 5000;
            royaltyFees = category === 'Golden' ? 70000 :
                          category === 'Silver' ? 60000 : 50000;
        }

        if (categoryType === 'Technical02') {
            applicationFees = 3000;
            royaltyFees = category === 'Golden' ? 30000 :
                          category === 'Silver' ? 25000 : 20000;
        }

        if (categoryType === 'Business02') {
            applicationFees = 3000;
            royaltyFees = category === 'Golden' ? 50000 :
                          category === 'Silver' ? 40000 : 30000;
        }

        if (categoryType === 'SubShortCodes') {
            applicationFees = 0;
            royaltyFees = 30000;
        }

        document.getElementById('applicationFees').value = applicationFees;
        document.getElementById('royaltyFees').value = royaltyFees;
    }

    document.addEventListener('DOMContentLoaded', function () {
        updateCategoryValues();
    });

    $(document).ready(function () {
        $('.search-select').select2();
    });
</script>

<div style="height:10vh;"></div>
<footer th:replace="~{codes_layout :: page_footer}"></footer>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>

</body>
</html>
