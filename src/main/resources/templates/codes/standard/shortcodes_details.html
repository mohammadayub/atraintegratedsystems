<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity3">

<head th:replace="~{codes_layout :: page_head}">
    <title th:text="#{telecomShortCodesRegistrationManagement}">Telecom Short Code Management System</title>
    <meta charset="UTF-8">

    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=EB+Garamond&display=swap"/>

    <div th:replace="styles :: data-tables-styles"></div>

    <style>
        body {
            background-color: #f5f5f5;
            font-family: 'EB Garamond', serif;
            font-weight: bold;
        }

        .table-container {
            margin-top: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.7em;
        }

        th, td {
            padding: 8px;
            text-align: center;
            vertical-align: middle;
            border: 1px solid #ddd;
        }

        thead th {
            color: white;
            background-color: #007bff;
            font-size: 12px;
        }

        tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .expired-date {
            background-color: #ffcccc !important;
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            font-weight: bold;
            background-color: #f8f9fa;
            padding: 15px;
        }

        @media print {
            .btn, .navbar, .footer {
                display: none !important;
            }

            table {
                font-size: 12px;
            }
        }

        @media print {
            @page {
                size: auto;
                margin: 10mm;
            }

            body {
                width: auto !important;
                overflow: visible !important;
            }

            .container-fluid {
                width: 100% !important;
            }

            table {
                width: 100% !important;
                table-layout: auto;
            }
        }
    </style>

    <div th:replace="styles :: ltr-to-rtl"></div>
</head>

<body>

<nav th:replace="~{codes_layout :: page_navbar}"></nav>

<div class="container-fluid"
     th:classappend="${#locale.language == 'ps' or #locale.language == 'prs'} ? 'label-rtl' : 'label-ltr'">

    <fieldset class="mt-4">
        <legend class="text-center mb-3" th:text="#{telecomShortCodesRegistrationManagement}"></legend>

        <div class="mb-3 text-end">
            <a class="btn btn-primary me-2"
               th:href="@{/codes/standard/shortcodes_details/add}">
                ➕ <span th:text="#{addRecord}"></span>
            </a>

            <button class="btn btn-success" onclick="printPage()">
                🖨 <span th:text="#{codesPrint}"></span>
            </button>
        </div>

        <div class="table-container">
            <table id="example" class="table table-bordered table-hover text-center">
                <thead>
                <tr>
                    <th>ID#</th>
                    <th th:text="#{shortCode}"></th>
                    <th>Serial Number</th>
                    <th th:text="#{codesStatus}"></th>
                    <th th:text="#{sourceUsed}"></th>
                    <th th:text="#{sourceUsedInDari}"></th>
                    <th th:text="#{codeLocation}"></th>
                    <th th:text="#{codeAddress}"></th>
                    <th th:text="#{codeChannel}"></th>
                    <th th:text="#{service}"></th>
                    <th th:text="#{selectCategory}"></th>
                    <th th:text="#{backLongNumber}"></th>
                    <th th:text="#{responsiblePerson}"></th>
                    <th th:text="#{job}"></th>
                    <th>ID Card</th>
                    <th th:text="#{mobileNumber}"></th>
                    <th th:text="#{codeEmail}"></th>
                    <th th:text="#{assingingDate}"></th>
                    <th th:text="#{expiryDate}"></th>
                    <th th:text="#{applicationFee}"></th>
                    <th th:text="#{royaltyFee}"></th>
                    <th th:text="#{codesStatus}"></th>
                    <th th:text="#{codesPrint}"></th>
                    <th th:text="#{codesUpdate}"></th>
                    <th th:text="#{codesRejection}"></th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="codeDetail : ${data}">
                    <td th:text="${codeDetail.id}"></td>
                    <td th:text="${codeDetail.shortCodeName}"></td>
                    <td th:text="${codeDetail.serialNumber}"></td>
                    <td th:text="${codeDetail.codeStatus}"></td>
                    <td th:text="${codeDetail.sourceUsed}"></td>
                    <td th:text="${codeDetail.sourceUsedInDari}"></td>
                    <td th:text="${codeDetail.location}"></td>
                    <td th:text="${codeDetail.address}"></td>
                    <td th:text="${codeDetail.chanel}"></td>

                    <td th:text="${codeDetail.services}"
                        dir="auto"
                        style="unicode-bidi: plaintext; text-align: start;"></td>

                    <td th:text="${codeDetail.category}"></td>
                    <td th:text="${codeDetail.backLongNumber}"></td>
                    <td th:text="${codeDetail.responsiblePerson}"></td>
                    <td th:text="${codeDetail.job}"></td>
                    <td th:text="${codeDetail.idCard}"></td>
                    <td th:text="${codeDetail.mobile}"></td>
                    <td th:text="${codeDetail.email}"></td>
                    <td th:text="${codeDetail.assignDateJalali}"></td>
                    <td th:text="${codeDetail.ExpireDateJalali}"></td>
                    <td th:text="${codeDetail.applicationFees}"></td>
                    <td th:text="${codeDetail.royaltyFees}"></td>
                    <td th:text="${codeDetail.paymentStatus}"></td>

                    <td>
                        <a th:href="@{/codes/standard/shortcodes_details/print/{id}(id=${codeDetail.id})}"
                           class="btn btn-info btn-sm">
                            🖨 <span th:text="#{codesPrint}"></span>
                        </a>
                    </td>

                    <td>
                        <a th:href="@{/codes/standard/shortcodes_details/update/{id}(id=${codeDetail.id})}"
                           class="btn btn-warning btn-sm">
                            <span th:text="#{codesUpdate}"></span>
                        </a>
                    </td>

                    <td>
                        <a th:href="@{/codes/standard/shortcodes_details/reject/{id}(id=${codeDetail.id})}"
                           class="btn btn-danger btn-sm">
                            <span th:text="#{codesRejection}"></span>
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <a th:href="@{/codes/standard/shortcodes/home}"
           class="mt-2 btn btn-primary">
            <span th:text="#{codesBack}"></span>
        </a>
    </fieldset>
</div>

<div th:replace="scripts :: common-scripts"></div>
<div th:replace="scripts :: data-tables-scripts"></div>

<script>
    function printPage() {
        document.body.classList.add('print-style');
        window.print();
        document.body.classList.remove('print-style');
    }

    new DataTable('#example');
</script>

<div style="height:10vh;"></div>
<footer th:replace="~{codes_layout :: page_footer}"></footer>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
