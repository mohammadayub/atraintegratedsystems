<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{codes_layout :: page_head}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{ispcCodesManagementSection}">ISPC Code</title>

    <div th:replace="styles :: common-css"></div>
    <div th:replace="styles :: commonfieldset"></div>
    <div th:replace="styles :: persian-datepicker-styles"></div>

    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">

    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'EB Garamond', serif;
            font-weight: bold;
        }

        .container {
            margin-top: 70px;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        #footer {
            margin-top: 60px;
            background: rgba(0, 0, 0, 0.05);
            text-align: center;
            padding: 15px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<nav th:replace="~{codes_layout :: page_navbar}"></nav>

<div class="container d-flex justify-content-center mt-4">
    <div class="col-sm-10 col-md-6 col-lg-4">

        <div class="card p-4">

            <!-- FIXED TITLE -->
            <h3 class="text-center mb-4 text-primary"
                th:if="${ispcCode.id == null}"
                th:text="#{addIspcCode}">
                Add ISPC Code
            </h3>

            <h3 class="text-center mb-4 text-primary"
                th:unless="${ispcCode.id == null}"
                th:text="#{codesUpdate}">
                Update ISPC Code
            </h3>

            <form th:action="@{/codes/ispc/save}"
                  th:object="${ispcCode}"
                  method="post">

                <input type="hidden" th:field="*{id}"/>

                <div class="form-group mb-3">
                    <label class="form-label" th:text="#{ispcCodeName}">
                        ISPC Code Name
                    </label>

                    <input type="text"
                           class="form-control"
                           th:field="*{ispcCodeName}"
                           th:placeholder="#{ispcCodeName}"
                           required>
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <button type="submit"
                            class="btn btn-primary"
                            th:text="#{codesSave}">
                        Save
                    </button>

                    <a class="btn btn-secondary"
                       th:href="@{/codes/ispc-code/home}"
                       th:text="#{codesBack}">
                        ← Back to Page
                    </a>
                </div>

            </form>

        </div>
    </div>
</div>

<!-- Common scripts -->
<div th:replace="scripts :: common-scripts"></div>
<div th:replace="scripts :: persian-datepicker-scripts"></div>
<div th:replace="scripts :: common-hijrishamsi-date"></div>

<footer th:replace="~{codes_layout :: page_footer}"></footer>
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>

</body>
</html>
