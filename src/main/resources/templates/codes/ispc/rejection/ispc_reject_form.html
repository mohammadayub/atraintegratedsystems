<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{codes_layout :: page_head}">
    <title th:text="#{codesRejection}">Reject ISPC</title>

    <div th:replace="styles :: persian-datepicker-styles"></div>
    <div th:replace="styles :: common-css"></div>
    <div th:replace="styles :: commonfieldset"></div>
</head>

<body>

<nav th:replace="~{codes_layout :: page_navbar}"></nav>

<div class="container-fluid mt-4"
     th:classappend="${#locale.language == 'ps' or #locale.language == 'prs'} ? 'label-rtl' : 'label-ltr'">

    <form th:action="@{/codes/ispc/details/reject/save}"
          th:object="${detail}"
          method="post">

        <input type="hidden" th:field="*{id}"/>

        <fieldset style="border:2px solid #DCAF45;padding:15px;border-radius:8px;margin-bottom:20px;">

            <legend style="width:auto;font-size:1.2rem;color:#14438B;padding:0 10px;font-weight:bold;"
                    th:text="#{codesRejection}">
                Reject ISPC Code
            </legend>

            <div class="row g-3">

                <div class="col-md-4">
                    <label th:text="#{codesStatus}">Rejection Status</label>

                    <input type="text"
                           value="Rejected"
                           class="form-control"
                           readonly>
                </div>

                <div class="col-md-4">
                    <label th:text="#{rejectionDate}">Rejection Date</label>

                    <input type="text"
                           th:field="*{ispcCodeRejectionDateJalali}"
                           class="form-control hijrishamsi"
                           placeholder="YYYY-MM-DD"
                           required>
                </div>

            </div>

            <!-- BUTTONS -->

            <div class="row mt-4">

                <div class="col-md-4 mx-auto d-flex justify-content-center gap-2">

                    <button type="submit"
                            class="btn btn-danger"
                            th:text="#{codesRejection}">
                        Confirm Reject
                    </button>

                    &nbsp;&nbsp;

                    <a th:href="@{/codes/ispc/details}"
                       class="btn btn-secondary"
                       th:text="#{codesCancel}">
                        Cancel
                    </a>

                </div>

            </div>

        </fieldset>

    </form>

    <a th:href="@{/codes/ispc/details/rejected}"
       class="btn btn-primary mt-3"
       th:text="#{codesBack}">
        ← Back to Page
    </a>

</div>

<!-- Scripts -->

<div th:replace="scripts :: common-scripts"></div>
<div th:replace="scripts :: persian-datepicker-scripts"></div>
<div th:replace="scripts :: common-hijrishamsi-date"></div>

<div style="height:10vh;"></div>

<footer th:replace="~{codes_layout :: page_footer}"></footer>

</body>
</html>
