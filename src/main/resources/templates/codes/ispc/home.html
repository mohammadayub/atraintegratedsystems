<!DOCTYPE html>
<html lang="en"
      th:lang="#{lang}"
      th:dir="${#locale.language == 'ps' or #locale.language == 'prs' ? 'rtl' : 'ltr'}"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity5">

<head th:replace="~{codes_layout :: page_head}">
    <title th:text="#{ispcCodesManagementSection}">AIS</title>

    <div th:replace="styles :: common-css"></div>
    <div th:replace="styles :: commonfieldset"></div>

    <!-- SAME LMS DASHBOARD STYLE -->
    <style>
        a h4 {
            color: #14438B;
            font-size: 20px;
            text-decoration: none;
            font-weight: 600;
        }

        .custom-card {
            text-align: center;
            padding: 20px;
            border-radius: 12px;
            transition: 0.3s ease;
        }

        .custom-card:hover {
            transform: translateY(-5px);
        }

        .custom-card img {
            height: 80px;
        }
    </style>

    <div th:replace="styles :: ltr-to-rtl"></div>
</head>

<body>

<nav th:replace="~{codes_layout :: page_navbar}"></nav>

<!-- This is Main Page -->
<div class="container mt-4">

    <!-- ================= ISPC CODES ================= -->
    <fieldset sec:authorize="hasAnyRole('ROLE_ADMIN','ROLE_CODES_ADMIN')">
        <legend th:text="#{ispcCodesManagementSection}">
            ISPC Codes Management Section
        </legend>

        <table class="table table-borderless text-center">
            <tr>
                <td>
                    <div class="custom-card"
                         sec:authorize="hasAnyRole('ROLE_ADMIN','ROLE_CODES_ADMIN')">
                        <a th:href="@{/codes/ispc/add}">
                            <img th:src="@{/images/shortCodes.png}"
                                 th:alt="#{addIspcCode}">
                            <h4 style="margin-top:12px;"
                                th:text="#{addIspcCode}">
                                Add ISPC Code
                            </h4>
                        </a>
                    </div>
                </td>

                <td>
                    <div class="custom-card"
                         sec:authorize="hasAnyRole('ROLE_ADMIN','ROLE_CODES_ADMIN')">
                        <a th:href="@{/codes/ispc/list}">
                            <img th:src="@{/images/smsidentifiercode.png}"
                                 th:alt="#{ispcCodeList}">
                            <h4 style="margin-top:12px;"
                                th:text="#{ispcCodeList}">
                                ISPC Code List
                            </h4>
                        </a>
                    </div>
                </td>

                <td>
                    <div class="custom-card"
                         sec:authorize="hasAnyRole('ROLE_ADMIN','ROLE_CODES_ADMIN')">
                        <a th:href="@{/codes/ispc/details/create}">
                            <img th:src="@{/images/codeDetail.png}"
                                 th:alt="#{ispcCodeDetail}">
                            <h4 style="margin-top:12px;"
                                th:text="#{ispcCodeDetail}">
                                ISPC Code Detail
                            </h4>
                        </a>
                    </div>
                </td>

                <td>
                    <div class="custom-card"
                         sec:authorize="hasAnyRole('ROLE_ADMIN','ROLE_CODES_ADMIN')">
                        <a th:href="@{/codes/ispc/details}">
                            <img th:src="@{/images/code_detail_list.png}"
                                 th:alt="#{ispcCodeDetailList}">
                            <h4 style="margin-top:12px;"
                                th:text="#{ispcCodeDetailList}">
                                ISPC Code Detail List
                            </h4>
                        </a>
                    </div>
                </td>
            </tr>
        </table>
    </fieldset>

    <!-- ================= REJECTION ================= -->
    <fieldset sec:authorize="hasAnyRole('ROLE_ADMIN','ROLE_CODES_ADMIN')">
        <legend th:text="#{ispcCodeRejectionManagementSection}">
            ISPC Code Rejection Management Section
        </legend>

        <table class="table table-borderless text-center">
            <tr>
                <td>
                    <div class="custom-card"
                         sec:authorize="hasAnyRole('ROLE_ADMIN','ROLE_CODES_ADMIN')">
                        <a th:href="@{/codes/ispc/details/rejected}">
                            <img th:src="@{/images/rejectionList.png}"
                                 th:alt="#{rejectedIspcCodesList}">
                            <h4 style="margin-top:12px;"
                                th:text="#{rejectedIspcCodesList}">
                                Rejected ISPC Codes List
                            </h4>
                        </a>
                    </div>
                </td>
            </tr>
        </table>
    </fieldset>

    <!-- ================= EXTENSION ================= -->
    <fieldset sec:authorize="hasAnyRole('ROLE_ADMIN','ROLE_CODES_ADMIN')">
        <legend th:text="#{ispcCodeExtensionManagementSection}">
            ISPC Code Extension Management Section
        </legend>

        <table class="table table-borderless text-center">
            <tr>
                <td>
                    <div class="custom-card"
                         sec:authorize="hasAnyRole('ROLE_ADMIN','ROLE_CODES_ADMIN')">
                        <a th:href="@{/codes/ISPC/standard/extension/home}">
                            <img th:src="@{/images/serialNumber.png}"
                                 th:alt="#{ispcCodeExtension}">
                            <h4 style="margin-top:12px;"
                                th:text="#{ispcCodeExtension}">
                                ISPC Code Extension
                            </h4>
                        </a>
                    </div>
                </td>
            </tr>
        </table>
    </fieldset>

</div>

<div th:replace="scripts :: common-scripts"></div>
<div style="height:10vh;"></div>
<footer th:replace="~{codes_layout :: page_footer}"></footer>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>

</body>
</html>
