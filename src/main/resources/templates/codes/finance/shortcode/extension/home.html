<!DOCTYPE html>
<html lang="en"
      th:lang="#{lang}"
      th:dir="${#locale.language == 'ps' or #locale.language == 'prs' ? 'rtl' : 'ltr'}"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity5">

<head th:replace="~{codes_layout :: page_head}">
    <title>LMS</title>

    <div th:replace="styles :: commonfieldset"></div>

    <!-- SAME LMS DASHBOARD STYLE -->
    <style>
        a h4 {
            color: #14438B;
            font-size: 20px;
            text-decoration: none;
            font-weight: 600;
        }

        .custom-card {
            text-align: center;
            padding: 20px;
            border-radius: 12px;
            transition: 0.3s ease;
        }

        .custom-card:hover {
            transform: translateY(-5px);
        }

        .custom-card img {
            height: 80px;
        }
    </style>
</head>

<body>

<nav th:replace="~{codes_layout :: page_navbar}"></nav>
<div class="container mt-4">

    <!-- ================= EXTENSION MANAGEMENT ================= -->
    <fieldset sec:authorize="hasAnyRole('ROLE_ADMIN','ROLE_CODES_ADMIN')">
        <legend>Short Codes Extension Management Section</legend>

        <table class="table table-borderless text-center">
            <tr>

                <td>
                    <div class="custom-card"
                         sec:authorize="hasAnyRole('ROLE_ADMIN','ROLE_CODES_ADMIN')">

                        <a th:href="@{/codes/extended/code-extension/extension-fee/list}">
                            <img th:src="@{/images/shortCodeFinance.png}" alt="Application Fee Extension">
                            <h4 style="margin-top:12px;">
                                Extended Fee Extension
                            </h4>
                        </a>

                    </div>
                </td>


            </tr>
        </table>
    </fieldset>
    <!-- ================= PAID EXTENSION ================= -->
    <fieldset sec:authorize="hasAnyRole('ROLE_ADMIN','ROLE_CODES_ADMIN')">
        <legend>Short Codes Paid Extension</legend>

        <table class="table table-borderless text-center">
            <tr>

                <td>
                    <div class="custom-card"
                         sec:authorize="hasAnyRole('ROLE_ADMIN','ROLE_CODES_ADMIN')">

                        <a th:href="@{/codes/extended/extensions/paid/list}">
                            <img th:src="@{/images/shortCodeFinance.png}" alt="Paid Application Fee Extension">
                            <h4 style="margin-top:12px;">
                                Paid Extended Fee List
                            </h4>
                        </a>

                    </div>
                </td>


            </tr>
        </table>
    </fieldset>
    <a th:href="@{/codes/standard/shortcodes/home}"
       class="mt-2 btn btn-primary mt-3">
        ← Back to Page
    </a>

</div>

<div th:replace="scripts :: common-scripts"></div>

<div style="height:10vh;"></div>

<footer th:replace="~{codes_layout :: page_footer}"></footer>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>

</body>
</html>
