<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{codes_layout :: page_head}">
    <meta charset="UTF-8">
    <div th:replace="styles :: data-tables-styles"></div>
    <div th:replace="styles :: common-css"></div>
    <div th:replace="styles :: commonfieldset-with-legend-border"></div>
    <title>Unpaid Application Fee Extensions</title>
</head>
<body>
<nav th:replace="~{codes_layout :: page_navbar}"></nav>
<div class="container-fluid"
     th:classappend="${#locale.language == 'ps' or #locale.language == 'prs'} ? 'label-rtl' : 'label-ltr'">

    <fieldset>
        <legend>
            Unpaid Extended Fee Extensions
        </legend>

        <div class="table-container">
            <table class="slip" id="profileTable">

                <thead>
                <tr class="bg-primary">
                    <th>#</th>
                    <th>Extension Date</th>
                    <th>Expiration Date</th>
                    <th>Extended Fee</th>
                    <th>Voucher No</th>
                    <th>Entry Voucher Date</th>
                    <th>Submission Date</th>
                    <th>Status</th>
                    <th>Extend</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="ext, stat : ${extensions}">

                    <td th:text="${stat.count}"></td>
                    <td th:text="${ext.extendedFeeExtensionDate}"></td>
                    <td th:text="${ext.extendedFeeExtensionExpirationDate}"></td>
                    <td th:text="${ext.extendedFees}"></td>
                    <td th:text="${ext.extendedFeeExtensionBankVoucherNo}"></td>
                    <td th:text="${ext.extendedFeeExtensionEntryVoucherDate}"></td>
                    <td th:text="${ext.extendedFeeExtensionBankVoucherSubmissionDate}"></td>

                    <td>
                        <span class="badge bg-warning text-dark">
                            UNPAID
                        </span>
                    </td>

                    <!-- Pay -->
                    <td>
                        <a th:href="@{/extended-fee-extension/pay/{id}(id=${ext.id})}">

                            <img th:src="@{/images/codesExtension.png}" alt="extension" />
                        </a>
                    </td>
                </tr>

                </tbody>

            </table>
        </div>
    </fieldset>

    <a th:href="@{/codes/shortcode/finance/home}"
       class="btn btn-primary"
       style="margin-top:20px;">
        ← Back to Page
    </a>

</div>

<!-- Scripts -->
<div th:replace="scripts :: common-scripts"></div>
<div th:replace="scripts :: data-tables-scripts"></div>
<div th:replace="scripts :: common-datatable"></div>

<div style="height:5vh;"></div>
<footer th:replace="~{codes_layout :: page_footer}"></footer>

</body>
</html>
