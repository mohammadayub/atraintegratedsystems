<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{codes_layout :: page_head}">
    <title th:text="#{smsIdentifierRoyaltyFeeList}">SMS Identifier Royalty Fees List</title>

    <div th:replace="styles :: data-tables-styles"></div>
    <div th:replace="styles :: common-css"></div>
    <div th:replace="styles :: commonfieldset-with-legend-border"></div>
    <div th:replace="styles :: persian-datepicker-styles"></div>
</head>
<body>

<nav th:replace="~{codes_layout :: page_navbar}"></nav>

<div class="container-fluid"
     th:classappend="${#locale.language == 'ps' or #locale.language == 'prs'} ? 'label-rtl' : 'label-ltr'">

    <fieldset>
        <legend th:text="#{smsIdentifierRoyalty}">
            Sms Identifier Royalty Fees List
        </legend>

        <div class="table-container">
            <table class="slip table table-bordered table-striped"
                   id="profileTable"
                   style="width:100%">

                <thead>
                <tr class="bg-primary text-white">
                    <th>#</th>
                    <th th:text="#{smsIdentifierCode}">Code Name</th>
                    <th th:text="#{companyName}">Company</th>
                    <th th:text="#{tazkira}">ENID</th>
                    <th th:text="#{mobileNumber}">Mobile</th>
                    <th th:text="#{codeEmail}">Email</th>
                    <th th:text="#{smsIdentifierChannel}">Channel</th>
                    <th th:text="#{smsIdentifierServiceType}">Service Type</th>
                    <th th:text="#{assingingDate}">Assign Date</th>
                    <th th:text="#{expiryDate}">Expire Date</th>
                    <th th:text="#{print}">Print Tariff</th>
                    <th th:text="#{confirmPayment}">Confirm Payment</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="item, stat : ${list}">
                    <td th:text="${stat.count}"></td>
                    <td th:text="${item.smsIdentifierCodeName}"></td>
                    <td th:text="${item.companyName}"></td>
                    <td th:text="${item.enid}"></td>
                    <td th:text="${item.mobile}"></td>
                    <td th:text="${item.email}"></td>
                    <td th:text="${item.channel}"></td>
                    <td th:text="${item.serviceType}"></td>
                    <td th:text="${item.assigningDate}"></td>
                    <td th:text="${item.expirationDate}"></td>

                    <td>
                        <a class="btn btn-sm btn-secondary"
                           th:href="@{/codes/sms-identifier-royaltyfee/print-tariff/{id}(id=${item.id})}">
                            <span th:text="#{print}">Print Tariff</span>
                        </a>
                    </td>

                    <td>
                        <a class="btn btn-sm btn-primary"
                           th:href="@{/codes/sms-identifier-royaltyfee/pay/{id}(id=${item.id})}">
                            <span>Pay</span>
                        </a>
                    </td>

                </tr>
                </tbody>
            </table>
        </div>
    </fieldset>

    <a th:href="@{/codes/smsidentifier/finance/home}"
       class="btn btn-primary mt-3">
        <span th:text="#{codesBack}">← Back to Page</span>
    </a>

</div>

<!-- Scripts -->
<div th:replace="scripts :: common-scripts"></div>
<div th:replace="scripts :: data-tables-scripts"></div>
<div th:replace="scripts :: common-datatable"></div>
<div th:replace="scripts :: persian-datepicker-scripts"></div>
<div th:replace="scripts :: common-hijrishamsi-date"></div>

<div style="height:10vh;"></div>
<footer th:replace="~{codes_layout :: page_footer}"></footer>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
