<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{codes_layout :: page_head}">
    <title th:text="#{smsIdentifierDetailList}">SMS Identifier Details</title>

    <div th:replace="styles :: data-tables-styles"></div>
    <div th:replace="styles :: common-css"></div>
    <div th:replace="styles :: commonfieldset-with-legend-border"></div>
    <div th:replace="styles :: persian-datepicker-styles"></div>
</head>

<body>

<nav th:replace="~{codes_layout :: page_navbar}"></nav>
<div class="container-fluid"
     th:classappend="${#locale.language == 'ps' or #locale.language == 'prs'} ? 'label-rtl' : 'label-ltr'">

    <fieldset>
        <legend th:text="#{smsIdentifierDetailList}">SMS Identifier Details</legend>

        <div class="table-container">

            <table class="slip table table-bordered table-striped"
                   id="profileTable"
                   style="width:100%">

                <thead>
                <tr class="bg-primary text-white">

                    <th>#</th>
                    <th th:text="#{smsIdentifierCode}">SMS Code</th>
                    <th th:text="#{companyName}">Company Name</th>
                    <th th:text="#{companyNameInDari}">Company Name In Dari</th>
                    <th th:text="#{codeSerialNumber}">Serial Number</th>
                    <th th:text="#{smsIdentifierMobile}">Mobile</th>
                    <th th:text="#{smsIdentifierTelephone}">Telephone</th>
                    <th th:text="#{codeEmail}">Email</th>
                    <th th:text="#{smsIdentifierChannel}">Channel</th>
                    <th th:text="#{smsIdentifierServiceType}">Service Type</th>
                    <th th:text="#{tazkira}">ENID</th>
                    <th th:text="#{responsiblePerson}">Responsible Person</th>
                    <th th:text="#{assingingDate}">Assign Date</th>
                    <th th:text="#{expirationDate}">Expire Date</th>
                    <th th:text="#{remark}">Remark</th>
                    <th th:text="#{codesAction}">Edit</th>
                    <th th:text="#{codesDelete}">Delete</th>
                    <th th:text="#{codesPrint}">Print</th>

                </tr>
                </thead>

                <tbody>

                <tr th:each="d, iStat : ${details}">

                    <td th:text="${iStat.count}"></td>

                    <td th:text="${d.smsIdentifierCodeName}"></td>

                    <td th:text="${d.companyName}"></td>

                    <td th:text="${d.companyNameInDari}"></td>

                    <td th:text="${d.serialNumber}"></td>

                    <td th:text="${d.mobile}"></td>

                    <td th:text="${d.telephone}"></td>

                    <td th:text="${d.email}"></td>

                    <td th:text="${d.channel}"></td>

                    <td th:text="${d.serviceType}"
                        dir="auto"
                        style="unicode-bidi: plaintext; text-align: start;">
                    </td>

                    <td th:text="${d.enid}"></td>

                    <td th:text="${d.responsiblePerson}"></td>

                    <td th:text="${d.assigningDateJalali}"></td>

                    <td th:text="${d.expirationDateJalali}"></td>

                    <td th:text="${d.remark}"></td>

                    <!-- EDIT -->
                    <td>
                        <a th:href="@{/codes/sms-identifier/details/edit/{id}(id=${d.id})}"
                           class="btn btn-warning btn-sm"
                           th:text="#{codesUpdate}">
                            Edit
                        </a>
                    </td>

                    <!-- DELETE -->
                    <td>
                        <a th:href="@{/codes/sms-identifier/details/delete/{id}(id=${d.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Are you sure to delete?')"
                           th:text="#{codesDelete}">
                            Delete
                        </a>
                    </td>

                    <!-- PRINT -->
                    <td>
                        <a th:href="@{/codes/sms-identifier/details/print/{id}(id=${d.id})}"
                           class="btn btn-success btn-sm"
                           target="_blank"
                           th:text="#{codesPrint}">
                            🖨 Print
                        </a>
                    </td>

                </tr>

                </tbody>
            </table>

        </div>

    </fieldset>

    <a th:href="@{/codes/sms-identifier/home}"
       class="btn btn-primary mt-3"
       th:text="#{codesBack}">
        ← Back to Page
    </a>

</div>

<!-- Scripts -->

<div th:replace="scripts :: common-scripts"></div>
<div th:replace="scripts :: data-tables-scripts"></div>
<div th:replace="scripts :: common-datatable"></div>
<div th:replace="scripts :: persian-datepicker-scripts"></div>
<div th:replace="scripts :: common-hijrishamsi-date"></div>

<div style="height:10vh;"></div>

<footer th:replace="~{codes_layout :: page_footer}"></footer>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>

</body>
</html>
