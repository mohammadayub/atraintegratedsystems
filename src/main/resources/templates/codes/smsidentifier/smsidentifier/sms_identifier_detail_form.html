<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{codes_layout :: page_head}">
    <title th:text="#{smsIdentifierDetail}">SMS Identifier Detail</title>

    <div th:replace="styles :: persian-datepicker-styles"></div>
    <div th:replace="styles :: common-css"></div>
    <div th:replace="styles :: commonfieldset"></div>
    <div th:replace="styles :: select2-styles"></div>
</head>

<body>

<nav th:replace="~{codes_layout :: page_navbar}"></nav>

<div class="container-fluid mt-4"
     th:classappend="${#locale.language == 'ps' or #locale.language == 'prs'} ? 'label-rtl' : 'label-ltr'">

    <!-- ✅ SINGLE SAVE ENDPOINT -->
    <form th:action="${detail.id == null} ?
        @{/codes/sms-identifier/details/save} :
        @{/codes/sms-identifier/details/update/{id}(id=${detail.id})}"
          th:object="${detail}"
          method="post">

        <!-- ✅ IMPORTANT FOR UPDATE -->
        <input type="hidden" th:field="*{id}"/>

        <fieldset style="border:2px solid #DCAF45;padding:15px;border-radius:8px;margin-bottom:20px;">

            <legend style="width:auto;font-size:1.2rem;color:#14438B;padding:0 10px;font-weight:bold;"
                    th:text="#{smsIdentifierDetail}">
                SMS Identifier Detail Form
            </legend>

            <div class="row g-3">

                <!-- ROW 1 -->

                <div class="col-md-3">
                    <label class="form-label" th:text="#{smsIdentifierCode}">SMS Identifier Code</label>

                    <select class="form-control search-select"
                            th:field="*{smsIdentifierCodeId}"
                            required>

                        <option value="" th:text="#{selectCategory}">-- Select Code --</option>

                        <option th:each="c : ${codes}"
                                th:value="${c.id}"
                                th:text="${c.smsIdentifierCodeName}">
                        </option>

                    </select>
                </div>

                <div class="col-md-3">
                    <label th:text="#{companyName}">Company Name</label>
                    <input type="text" th:field="*{companyName}" class="form-control">
                </div>

                <div class="col-md-3">
                    <label th:text="#{companyNameInDari}">Company Name (Dari)</label>
                    <input type="text" th:field="*{companyNameInDari}" class="form-control">
                </div>

                <div class="col-md-3">
                    <label th:text="#{responsiblePerson}">Responsible Person</label>
                    <input type="text" th:field="*{responsiblePerson}" class="form-control">
                </div>

                <!-- ROW 2 -->

                <div class="col-md-3">
                    <label th:text="#{job}">Job</label>
                    <input type="text" th:field="*{job}" class="form-control">
                </div>

                <div class="col-md-3">
                    <label>ENID</label>
                    <input type="text" th:field="*{enid}" class="form-control">
                </div>

                <div class="col-md-3">
                    <label th:text="#{smsIdentifierMobile}">Mobile</label>
                    <input type="text" th:field="*{mobile}" class="form-control">
                </div>

                <div class="col-md-3">
                    <label th:text="#{smsIdentifierTelephone}">Telephone</label>
                    <input type="text" th:field="*{telephone}" class="form-control">
                </div>

                <!-- ROW 3 -->

                <div class="col-md-3">
                    <label th:text="#{codeEmail}">Email</label>
                    <input type="email" th:field="*{email}" class="form-control">
                </div>

                <div class="col-md-3">
                    <label th:text="#{smsIdentifierCompanyAddress}">Company Address</label>
                    <input type="text" th:field="*{companyAddress}" class="form-control">
                </div>

                <div class="col-md-3">
                    <label th:text="#{smsIdentifierChannel}">Channel</label>
                    <input type="text" th:field="*{channel}" class="form-control">
                </div>

                <div class="col-md-3">
                    <label th:text="#{smsIdentifierServiceType}">Service Type</label>
                    <input type="text" th:field="*{serviceType}" class="form-control">
                </div>

                <!-- ROW 4 -->

                <div class="col-md-3">
                    <label th:text="#{MNOHost}">MNO Host</label>
                    <input type="text" th:field="*{mnosCompanyHost}" class="form-control">
                </div>

                <div class="col-md-3">
                    <label th:text="#{assingingDate}">Assigning Date</label>
                    <input type="text"
                           th:field="*{assigningDateJalali}"
                           class="form-control hijrishamsi">
                </div>

                <div class="col-md-3">
                    <label th:text="#{expirationDate}">Expiration Date</label>
                    <input type="text"
                           th:field="*{expirationDateJalali}"
                           class="form-control hijrishamsi">
                </div>

                <div class="col-md-3">
                    <label th:text="#{applicationFee}">Application Fee</label>
                    <input type="text"
                           th:field="*{applicationFees}"
                           class="form-control"
                           readonly>
                </div>

                <!-- ROW 5 -->

                <div class="col-md-3">
                    <label th:text="#{royaltyFee}">Royalty Fee</label>
                    <input type="text"
                           th:field="*{royaltyFees}"
                           class="form-control"
                           readonly>
                </div>

                <div class="col-md-3">
                    <label th:text="#{remark}">Remarks</label>
                    <textarea class="form-control"
                              th:field="*{remark}"></textarea>
                </div>

            </div>

            <!-- BUTTONS -->

            <div class="row mt-4">
                <div class="col-md-4 mx-auto d-flex justify-content-center gap-2">

                    <button type="submit" class="btn btn-success"
                            th:text="#{codesSave}">
                        Save
                    </button>

                    &nbsp;&nbsp;

                    <a th:href="@{/codes/sms-identifier/details}"
                       class="btn btn-secondary"
                       th:text="#{codesBack}">
                        Back
                    </a>

                </div>
            </div>

        </fieldset>

    </form>

</div>

<!-- Scripts -->

<div th:replace="scripts :: common-scripts"></div>
<div th:replace="scripts :: persian-datepicker-scripts"></div>
<div th:replace="scripts :: select2-scripts"></div>

<div style="height:10vh;"></div>

<footer th:replace="~{codes_layout :: page_footer}"></footer>

<script>
    $(document).ready(function () {

        // Select2
        $('.search-select').select2({
            width: '100%'
        });

        // Persian Datepicker
        $('.hijrishamsi').persianDatepicker({
            format: 'YYYY-MM-DD',
            autoClose: true,
            initialValue: true,
            initialValueType: 'persian',
            observer: true,
            calendar: {
                persian: {
                    locale: 'en',
                    leapYearMode: 'astronomical'
                }
            },
            onShow: function () {
                $('.persian-datepicker-container').appendTo('body');
            }
        });

    });
</script>

</body>
</html>
