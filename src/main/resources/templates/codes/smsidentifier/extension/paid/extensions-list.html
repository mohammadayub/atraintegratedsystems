<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:lang="#{lang}"
      th:dir="${#locale.language == 'ps' or #locale.language == 'prs'} ? 'rtl' : 'ltr'">

<head>
    <title>SMS Identifier Extension Paid List</title>

    <!-- Layout Head -->
    <th:block th:replace="~{codes_layout :: page_head}"></th:block>

    <!-- Styles -->
    <th:block th:replace="styles :: data-tables-styles"></th:block>
    <th:block th:replace="styles :: common-css"></th:block>
    <th:block th:replace="styles :: commonfieldset-with-legend-border"></th:block>
</head>

<body>

<!-- Navbar -->
<th:block th:replace="~{codes_layout :: page_navbar}"></th:block>

<div class="container-fluid mt-4"
     th:classappend="${#locale.language == 'ps' or #locale.language == 'prs'} ? 'label-rtl' : 'label-ltr'">

    <fieldset class="commonfieldset-with-legend-border">
        <legend>SMS Identifier Extension Paid List</legend>

        <div class="table-responsive">
            <table id="profileTable" class="table table-bordered table-striped table-hover w-100">

                <thead class="bg-primary text-white">
                <tr>
                    <th>#</th>
                    <th>Code Name</th>
                    <th>Company</th>
                    <th>Mobile</th>
                    <th>Start Date (Jalali)</th>
                    <th>Expire Date (Jalali)</th>
                    <th>Extended Fee</th>
                    <th>Voucher No</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="ext, stat : ${extensions}">

                    <td th:text="${stat.count}">1</td>

                    <td th:text="${ext.smsIdentifierCodeName != null ? ext.smsIdentifierCodeName : '-'}"></td>
                    <td th:text="${ext.companyName != null ? ext.companyName : '-'}"></td>
                    <td th:text="${ext.mobile != null ? ext.mobile : '-'}"></td>

                    <td th:text="${ext.extensionStartDateJalali != null ? ext.extensionStartDateJalali : '-'}"></td>
                    <td th:text="${ext.extentionExpirationDateJalali != null ? ext.extentionExpirationDateJalali : '-'}"></td>

                    <td th:text="${ext.extendedFees + ' AFN'}"></td>
                   <td th:text="${ext.extensionBankVoucherNo != null ? ext.extensionBankVoucherNo : '-'}"></td>

                    <td>
                        <span th:text="${ext.extensionPaymentStatus != null ? ext.extensionPaymentStatus : 'UNKNOWN'}"
                              th:classappend="${ext.extensionPaymentStatus == 'PAID'} ? 'badge bg-success' : 'badge bg-warning text-dark'">
                        </span>
                    </td>

                    <td>
                        <a th:href="@{/sms/extensions/print/{id}(id=${ext.detailId})}"
                           class="btn btn-success btn-sm"
                           target="_blank">
                            🖨 Print
                        </a>
                    </td>

                </tr>
                </tbody>

            </table>
        </div>
    </fieldset>

    <div class="mt-3">
        <a th:href="@{/codes/sms-identifier/standard/extension/home}"
           class="btn btn-primary mt-3">
            ← Back to Page
        </a>
    </div>

</div>

<!-- Scripts -->
<th:block th:replace="scripts :: common-scripts"></th:block>
<th:block th:replace="scripts :: data-tables-scripts"></th:block>
<th:block th:replace="scripts :: common-datatable"></th:block>

<!-- Footer -->
<th:block th:replace="~{codes_layout :: page_footer}"></th:block>

</body>
</html>
