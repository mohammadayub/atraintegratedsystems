<!DOCTYPE html>
<html lang="en"
      th:lang="#{lang}"
      th:dir="${#locale.language == 'ps' or #locale.language == 'prs' ? 'rtl' : 'ltr'}"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity5">

<head th:replace="~{codes_layout :: page_head}">
    <title>AIS</title>
    <div th:replace="styles :: commonfieldset"></div>

    <style>
        a h4 {
            color: #14438B;
            font-size: 20px;
            text-decoration: none;
            font-weight: 600;
        }

        .custom-card {
            text-align: center;
            padding: 20px;
            border-radius: 12px;
            transition: 0.3s ease;
        }

        .custom-card:hover {
            transform: translateY(-5px);
        }

        .custom-card img {
            height: 80px;
        }

        /* ✅ FIX RTL/LTR FOR LEGEND */
        .label-rtl legend {
            direction: rtl;
            text-align: right;
        }

        .label-ltr legend {
            direction: ltr;
            text-align: left;
        }
    </style>
</head>

<body>

<nav th:replace="~{codes_layout :: page_navbar}"></nav>

<div class="container mt-4" th:classappend="${#locale.language == 'ps' or #locale.language == 'prs'} ? 'label-rtl' : 'label-ltr'">

    <!-- ================= CODES MANAGEMENT ================= -->
    <fieldset sec:authorize="hasAnyRole('ROLE_ADMIN','ROLE_CODES_ADMIN')" >
        <legend th:text="#{codesManagementSection}">Codes Management Section</legend>

        <table class="table table-borderless text-center">
            <tr>
                <td>
                    <div class="custom-card">
                        <a th:href="@{/codes/standard/shortcodes/home}">
                            <img th:src="@{/images/shortCodes.png}" alt="Short Code">
                            <h4 style="margin-top:12px;" th:text="#{shortCode}">Short Code</h4>
                        </a>
                    </div>
                </td>

                <td>
                    <div class="custom-card">
                        <a th:href="@{/codes/sms-identifier/home}">
                            <img th:src="@{/images/smsidentifiercode.png}" alt="SMS Identifier">
                            <h4 style="margin-top:12px;" th:text="#{smsIdentifierCode}">SMS Identifier Code</h4>
                        </a>
                    </div>
                </td>

                <td>
                    <div class="custom-card">
                        <a th:href="@{/codes/ispc-code/home}">
                            <img th:src="@{/images/ispcCode.png}" alt="ISPC Code">
                            <h4 style="margin-top:12px;" th:text="#{ispcCode}">ISPC Code</h4>
                        </a>
                    </div>
                </td>
            </tr>
        </table>
    </fieldset>


    <!-- ================= FINANCE MANAGEMENT ================= -->
    <fieldset sec:authorize="hasAnyRole('ROLE_ADMIN','ROLE_CODES_ADMIN')">
        <legend th:text="#{codesFinanceManagementSection}">Codes Finance Management Section</legend>

        <table class="table table-borderless text-center">
            <tr>
                <td>
                    <div class="custom-card">
                        <a th:href="@{/codes/finance/home}">
                            <img th:src="@{/images/CodesFinance.png}" alt="Codes Finance">
                            <h4 style="margin-top:12px;" th:text="#{codesFinance}">Codes Finance</h4>
                        </a>
                    </div>
                </td>
            </tr>
        </table>
    </fieldset>


    <!-- ================= REPORTS ================= -->
    <fieldset sec:authorize="hasAnyRole('ROLE_ADMIN','ROLE_CODES_ADMIN')">
        <legend th:text="#{reportManagementSection}">Reports Management Section</legend>

        <table class="table table-borderless text-center">
            <tr>
                <td>
                    <div class="custom-card">
                        <a th:href="@{/codes/report/home}">
                            <img th:src="@{/images/reportManagement.png}" alt="Reports">
                            <h4 style="margin-top:12px;" th:text="#{codesReport}">Reports</h4>
                        </a>
                    </div>
                </td>
            </tr>
        </table>
    </fieldset>

</div>

<div th:replace="scripts :: common-scripts"></div>

<div style="height:10vh;"></div>
<footer th:replace="~{codes_layout :: page_footer}"></footer>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>

</body>
</html>
